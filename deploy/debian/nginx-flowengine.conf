# nginx site config for FlowEngine
# Drop into: /etc/nginx/sites-available/flowengine
# Enable:    ln -s /etc/nginx/sites-available/flowengine /etc/nginx/sites-enabled/
# Reload:    nginx -t && systemctl reload nginx
#
# TLS via Let's Encrypt:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d ai.ciem
# (certbot will rewrite this file in place to add ssl_certificate / 443 directives.)

# Redirect plain HTTP -> HTTPS. (certbot will edit/replace this block too.)
server {
    listen 80;
    listen [::]:80;
    server_name ai.ciem;

    # Allow ACME http-01 challenges.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else -> HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.ciem;

    # certbot fills these on first run:
    # ssl_certificate     /etc/letsencrypt/live/ai.ciem/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ai.ciem/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Reasonable defaults until certbot stamps them in.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:FlowSSL:10m;
    ssl_session_timeout 1d;

    # Gzip — text-heavy SPA + JSON.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/woff2;

    # Big request bodies (image uploads up to ~20MB).
    client_max_body_size 25m;

    # Optional basic-auth gate for the dashboard. Uncomment + provision
    # /etc/nginx/.htpasswd via:
    #   apt install apache2-utils
    #   htpasswd -c /etc/nginx/.htpasswd flow
    # auth_basic            "FlowEngine";
    # auth_basic_user_file  /etc/nginx/.htpasswd;

    # WebSocket upstream — keep separate so the connection upgrade is correct.
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # /api/worker/* must NOT be exposed publicly when basic-auth is OFF.
    # Restrict to the worker's source IP (replace with the Windows worker
    # box's public IP — or use a Tailscale/WireGuard tunnel and bind the
    # worker to the tunnel address). Comment out if using API_KEY alone.
    # location /api/worker/ {
    #     allow 203.0.113.42;   # <-- worker IP
    #     allow 100.64.0.0/10;  # <-- Tailscale CGNAT range
    #     deny  all;
    #     proxy_pass http://127.0.0.1:8080;
    #     include    /etc/nginx/proxy_params;
    # }

    # Everything else -> uvicorn.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Sensible logging.
    access_log /var/log/nginx/flowengine.access.log;
    error_log  /var/log/nginx/flowengine.error.log warn;
}
