<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f12">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%237c5cff%27/%3E%3Cpath d=%27M10 8v16l13-8z%27 fill=%27white%27/%3E%3C/svg%3E">
  <title>FlowEngine</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="css/flow-shell.css?v=4">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
</head>
<body>
  <div class="route-anchors" aria-hidden="true">
    <span id="home"></span>
    <span id="dashboard"></span>
    <span id="create"></span>
    <span id="chains"></span>
    <span id="profiles"></span>
    <span id="settings"></span>
    <span id="tts"></span>
  </div>

  <div id="app">
    <!-- Top app bar (visible on all routes) -->
    <header id="appbar">
      <div class="appbar-left">
        <button id="menu-toggle" class="icon-btn" aria-label="Open navigation">
          <span class="material-icons">menu</span>
        </button>
        <a href="#home" class="appbar-brand">
          <span class="material-icons brand-icon">movie_filter</span>
          <span class="brand-text">FlowEngine</span>
        </a>
      </div>
      <div class="appbar-right">
        <span class="tier-badge" title="Engine ULTRA tier">ULTRA</span>
        <button id="refresh-btn" class="icon-btn" title="Refresh" aria-label="Refresh current page">
          <span class="material-icons">refresh</span>
        </button>
        <div id="ws-status" class="ws-indicator disconnected" title="Realtime status">
          <span class="ws-dot"></span>
        </div>
        <div class="avatar-pill" title="Engine session">
          <span class="material-icons">account_circle</span>
        </div>
      </div>
    </header>

    <!-- Sidebar (drawer-style, hidden by default; toggled via menu button) -->
    <nav id="sidebar" class="drawer">
      <div class="sidebar-header">
        <span class="material-icons logo-icon">movie_filter</span>
        <h1 class="logo-text">FlowEngine</h1>
      </div>
      <ul class="nav-links">
        <li><a href="#home" class="nav-link" data-page="home"><span class="material-icons">home</span><span class="nav-label">Home</span></a></li>
        <li><a href="#dashboard" class="nav-link" data-page="dashboard"><span class="material-icons">dashboard</span><span class="nav-label">Dashboard</span></a></li>
        <li><a href="#create" class="nav-link" data-page="create"><span class="material-icons">add_circle</span><span class="nav-label">Create Job</span></a></li>
        <li><a href="#chains" class="nav-link" data-page="chains"><span class="material-icons">link</span><span class="nav-label">Chains</span></a></li>
        <li><a href="#characters" class="nav-link" data-page="characters"><span class="material-icons">face</span><span class="nav-label">Characters</span></a></li>
        <li><a href="#profiles" class="nav-link" data-page="profiles"><span class="material-icons">people</span><span class="nav-label">Profiles</span></a></li>
        <li><a href="#settings" class="nav-link" data-page="settings"><span class="material-icons">settings</span><span class="nav-label">Settings</span></a></li>
        <li><a href="#tts" class="nav-link" data-page="tts"><span class="material-icons">record_voice_over</span><span class="nav-label">TTS</span></a></li>
        <li><a href="#workflows" class="nav-link" data-page="workflows"><span class="material-icons">account_tree</span><span class="nav-label">Workflows</span></a></li>
      </ul>
    </nav>
    <div id="sidebar-scrim" class="scrim" aria-hidden="true"></div>

    <main id="content">
      <header id="top-bar">
        <h2 id="page-title">Home</h2>
        <div class="top-bar-actions"></div>
      </header>
      <div id="page-container">
        <!-- Pages load here -->
      </div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Job detail modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Job Details</h3>
        <button class="modal-close icon-btn" aria-label="Close modal">
          <span class="material-icons">close</span>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/home.js?v=4"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/create-job.js"></script>
  <script src="js/pages/chain-builder.js"></script>
  <script src="js/pages/characters.js"></script>
  <script src="js/pages/profiles.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/pages/tts.js"></script>
  <script src="js/pages/workflows.js"></script>
</body>
</html>
